<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>ComfyUI-Realtime manual voice test</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
  label { display: block; margin-top: 0.75rem; font-size: 0.9rem; color: #444; }
  input { width: 100%; box-sizing: border-box; padding: 0.4rem; font-size: 0.95rem; }
  button { margin-top: 1rem; padding: 0.6rem 1.2rem; font-size: 1rem; cursor: pointer; }
  #status { margin-top: 1rem; font-weight: bold; }
  #log { margin-top: 1rem; height: 360px; overflow-y: auto; background: #111; color: #ddd; padding: 0.75rem; font-family: ui-monospace, monospace; font-size: 0.82rem; white-space: pre-wrap; border-radius: 6px; }
  .ev-error { color: #ff6b6b; }
  .ev-text { color: #7ec8ff; }
  .ev-transcript { color: #ffd166; }
  .ev-speech { color: #95e06c; }
</style>
</head>
<body>
  <h2>ComfyUI-Realtime — manual voice test</h2>
  <p>Live mic capture &rarr; real protocol round trip &rarr; spoken response playback. VAD on the server detects turn boundaries automatically; just talk and pause.</p>

  <label>Server WebSocket URL
    <input id="wsUrl" value="ws://127.0.0.1:8188/v1/realtime" />
  </label>
  <label>Pipeline name (must already be registered, e.g. via scripts/register_phase2_pipeline.json)
    <input id="pipelineName" value="phase2-full" />
  </label>

  <button id="startBtn">Start (request mic + connect)</button>
  <button id="stopBtn" disabled>Stop</button>

  <div id="status">idle</div>
  <div id="log"></div>

<script>
"use strict";

// Wire format is fixed at pcm16/24kHz/mono (spec section 6.9). Constructing
// both the capture and playback AudioContexts AT that rate lets the browser
// do the hardware<->24kHz resampling internally -- no manual resampling code
// needed on either side of this tool.
const WIRE_SAMPLE_RATE = 24000;
// ~170ms per outgoing input_audio_buffer.append chunk -- small enough for
// responsive VAD, large enough not to spam the socket with a message every
// single 128-sample (5.3ms) AudioWorklet callback.
const SEND_CHUNK_SAMPLES = 4096;

const startBtn = document.getElementById("startBtn");
const stopBtn = document.getElementById("stopBtn");
const statusEl = document.getElementById("status");
const logEl = document.getElementById("log");

let ws = null;
let micStream = null;
let captureCtx = null;
let playbackCtx = null;
let micNode = null;
let sendBuffer = []; // accumulates Float32 samples until SEND_CHUNK_SAMPLES is reached
let nextPlayTime = 0; // AudioContext-clock time the next queued playback chunk should start at
let scheduledSources = []; // currently-scheduled-but-not-yet-finished playback sources, for barge-in stop

function log(text, cls) {
  const line = document.createElement("div");
  if (cls) line.className = cls;
  line.textContent = text;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

function setStatus(text) {
  statusEl.textContent = text;
}

// --- Outgoing: mic capture -> pcm16 -> base64 -> input_audio_buffer.append ---

const WORKLET_SOURCE = `
class MicCaptureProcessor extends AudioWorkletProcessor {
  process(inputs) {
    const channelData = inputs[0] && inputs[0][0];
    if (channelData) {
      // Float32Array, 128 samples per render quantum -- copy it, since the
      // underlying buffer is reused by the audio thread on the next call.
      this.port.postMessage(channelData.slice());
    }
    return true;
  }
}
registerProcessor("mic-capture-processor", MicCaptureProcessor);
`;

function floatTo16BitPCM(floatSamples) {
  const out = new Int16Array(floatSamples.length);
  for (let i = 0; i < floatSamples.length; i++) {
    const s = Math.max(-1, Math.min(1, floatSamples[i]));
    out[i] = s < 0 ? s * 32768 : s * 32767;
  }
  return out;
}

function int16ToBase64(int16Samples) {
  const bytes = new Uint8Array(int16Samples.buffer);
  let binary = "";
  for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
  return btoa(binary);
}

function flushSendBuffer(force) {
  while (sendBuffer.length >= SEND_CHUNK_SAMPLES || (force && sendBuffer.length > 0)) {
    const take = sendBuffer.splice(0, SEND_CHUNK_SAMPLES);
    const pcm16 = floatTo16BitPCM(Float32Array.from(take));
    const audioB64 = int16ToBase64(pcm16);
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: "input_audio_buffer.append", audio: audioB64 }));
    }
  }
}

async function startCapture() {
  micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  captureCtx = new AudioContext({ sampleRate: WIRE_SAMPLE_RATE });

  const blob = new Blob([WORKLET_SOURCE], { type: "application/javascript" });
  const workletUrl = URL.createObjectURL(blob);
  await captureCtx.audioWorklet.addModule(workletUrl);

  const source = captureCtx.createMediaStreamSource(micStream);
  micNode = new AudioWorkletNode(captureCtx, "mic-capture-processor");
  micNode.port.onmessage = (e) => {
    sendBuffer.push(...e.data);
    flushSendBuffer(false);
  };
  source.connect(micNode);
  // Not connecting micNode to captureCtx.destination -- we don't want to
  // hear our own mic looped back locally.
}

// --- Incoming: response.output_audio.delta -> pcm16 -> Float32 -> playback ---

function base64ToInt16(b64) {
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return new Int16Array(bytes.buffer);
}

function int16ToFloat32(int16Samples) {
  const out = new Float32Array(int16Samples.length);
  for (let i = 0; i < int16Samples.length; i++) {
    out[i] = int16Samples[i] / (int16Samples[i] < 0 ? 32768 : 32767);
  }
  return out;
}

function playAudioChunk(base64Audio) {
  const int16 = base64ToInt16(base64Audio);
  if (int16.length === 0) return;
  const floatSamples = int16ToFloat32(int16);

  const buffer = playbackCtx.createBuffer(1, floatSamples.length, WIRE_SAMPLE_RATE);
  buffer.copyToChannel(floatSamples, 0);

  const sourceNode = playbackCtx.createBufferSource();
  sourceNode.buffer = buffer;
  sourceNode.connect(playbackCtx.destination);

  const now = playbackCtx.currentTime;
  const startAt = Math.max(now, nextPlayTime);
  sourceNode.start(startAt);
  nextPlayTime = startAt + buffer.duration;

  scheduledSources.push(sourceNode);
  sourceNode.onended = () => {
    scheduledSources = scheduledSources.filter((s) => s !== sourceNode);
  };
}

function stopAllScheduledPlayback() {
  // Real barge-in: the server already cancelled generation server-side: this
  // stops whatever audio this CLIENT had already queued for playback, so the
  // user doesn't keep hearing the old response after they've started talking.
  for (const s of scheduledSources) {
    try { s.stop(); } catch (_e) { /* may already have finished */ }
  }
  scheduledSources = [];
  nextPlayTime = playbackCtx ? playbackCtx.currentTime : 0;
}

// --- WebSocket / protocol wiring ---

function connect() {
  const url = `${document.getElementById("wsUrl").value}?model=${encodeURIComponent(document.getElementById("pipelineName").value)}`;
  ws = new WebSocket(url);

  ws.onopen = () => setStatus("connected, waiting for session.created");

  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    switch (msg.type) {
      case "session.created":
        setStatus("session ready -- talk, then pause");
        log(`session.created: model=${msg.session.model}, modalities=${JSON.stringify(msg.session.modalities)}`);
        break;
      case "error":
        log(`error: ${msg.error.code} -- ${msg.error.message}`, "ev-error");
        break;
      case "input_audio_buffer.speech_started":
        log("speech_started (server detected you talking)", "ev-speech");
        stopAllScheduledPlayback(); // barge-in: stop hearing the old response
        break;
      case "input_audio_buffer.speech_stopped":
        log("speech_stopped", "ev-speech");
        break;
      case "conversation.item.input_audio_transcription.completed":
        log(`you said: "${msg.transcript}"`, "ev-transcript");
        break;
      case "conversation.item.input_audio_transcription.failed":
        log(`transcription failed: ${msg.error.message}`, "ev-error");
        break;
      case "response.output_text.delta":
        log(`assistant (text): ${msg.delta}`, "ev-text");
        break;
      case "response.output_audio.delta":
        playAudioChunk(msg.delta);
        break;
      case "response.done":
        log(`response.done (status: ${msg.response.status})`);
        break;
      default:
        // Uncomment for full protocol tracing:
        // log(JSON.stringify(msg));
        break;
    }
  };

  ws.onerror = () => log("websocket error", "ev-error");
  ws.onclose = (e) => setStatus(`disconnected (code ${e.code})`);
}

startBtn.addEventListener("click", async () => {
  startBtn.disabled = true;
  setStatus("requesting microphone...");
  try {
    playbackCtx = new AudioContext({ sampleRate: WIRE_SAMPLE_RATE });
    nextPlayTime = playbackCtx.currentTime;
    await startCapture();
    connect();
    stopBtn.disabled = false;
  } catch (err) {
    log(`startup failed: ${err.message}`, "ev-error");
    setStatus("failed to start");
    startBtn.disabled = false;
  }
});

stopBtn.addEventListener("click", () => {
  flushSendBuffer(true);
  if (ws) ws.close();
  if (micStream) micStream.getTracks().forEach((t) => t.stop());
  if (captureCtx) captureCtx.close();
  if (playbackCtx) playbackCtx.close();
  stopAllScheduledPlayback();
  setStatus("stopped");
  startBtn.disabled = false;
  stopBtn.disabled = true;
});
</script>
</body>
</html>
